test_with_go_modules: &test_with_go_modules
  steps:
    - checkout
    - run: go test ./...
    - run: go vet ./...

defaults: &defaults
  <<: *test_with_go_modules

version: 2
jobs:
  golang:1.21:
    <<: *defaults
    docker:
      - image: cimg/go:1.21
  golang:latest:
    <<: *defaults
    docker:
      - image: cimg/go:1.26
  coveralls:
    docker:
      - image: cimg/go:1.26
    steps:
      - checkout
      - run: go install github.com/mattn/goveralls@latest
      - run: |
          # Run tests across every non-example package and measure
          # coverage against the same set, so test runs in one
          # subpackage contribute to coverage of code in the others
          # (e.g. root tests count toward language/parser coverage).
          # Examples stay excluded — they have no tests and no
          # cross-package callers, so including them would drag the
          # measured coverage down to 0% of their statements.
          PKGS=$(go list ./... | grep -v /examples/)
          COVERPKG=$(echo "$PKGS" | tr '\n' ',' | sed 's/,$//')
          go test -v -cover -race -coverpkg="$COVERPKG" -coverprofile=coverage.out $PKGS
      - run: goveralls -coverprofile=coverage.out -service=circle-ci -repotoken $COVERALLS_TOKEN

workflows:
  version: 2
  build:
    jobs:
      - golang:1.21
      - golang:latest
      - coveralls
