test_with_go_modules: &test_with_go_modules
  steps:
    - checkout
    - run: go test ./...
    - run: go vet ./...

defaults: &defaults
  <<: *test_with_go_modules

version: 2
jobs:
  golang:1.21:
    <<: *defaults
    docker:
      - image: cimg/go:1.21
  golang:latest:
    <<: *defaults
    docker:
      - image: cimg/go:1.26
  coveralls:
    docker:
      - image: cimg/go:1.26
    steps:
      - checkout
      - run: go install github.com/mattn/goveralls@latest
      - run: go test -v -cover -race -coverprofile=coverage.out ./...
      - run: goveralls -coverprofile=coverage.out -service=circle-ci -repotoken $COVERALLS_TOKEN

workflows:
  version: 2
  build:
    jobs:
      - golang:1.21
      - golang:latest
      - coveralls
